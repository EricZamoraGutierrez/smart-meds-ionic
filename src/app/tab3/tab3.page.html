<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Perfil
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large"></ion-title>
    </ion-toolbar>
  </ion-header>


  <div class="background-box"></div>

  <div class="content-box">
    <h1>Create Account</h1>
    <div class="custom-file">
      <input type="file" id="photo" name="photo" accept="image/*" (change)="displayImage($event)">
      <label for="photo" class="file-label">
        <span class="file-text">Cambiar foto de perfil</span>
      </label>
    </div>
    <div class="profile-section">
      <div class="image-preview" *ngIf="imageSource">
        <img [src]="imageSource" alt="Vista previa de la imagen">
      </div>
    </div>
    <div class="form-wrapper">
      <form>
        <ion-item>
          <ion-label position="floating">Nombre:</ion-label>
          <ion-input type="text" id="name" name="name"></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Correo electrónico:</ion-label>
          <ion-input type="email" id="email" name="email"></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Contraseña:</ion-label>
          <ion-input type="password" id="password" name="password"></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Teléfono:</ion-label>
          <ion-input type="tel" id="phone" name="phone"></ion-input>
        </ion-item>

        <ion-button expand="full" type="submit">UPDATE</ion-button>
      </form>
    </div>
  </div>
</ion-content>
